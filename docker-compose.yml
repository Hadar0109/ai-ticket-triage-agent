version: '3.8'

services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_FILE_STORAGE_ENABLED=true
      - N8N_ALLOW_ENV_ACCESS=true
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./:/home/node/.n8n-files
    restart: unless-stopped
